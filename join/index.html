<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Envela 💌</title>
<meta name="apple-itunes-app" content="app-id=6779747084">
<!-- Rich-Preview in iMessage/WhatsApp: Karte zeigt „Envela" + Icon statt der nackten URL -->
<meta property="og:site_name" content="Envela">
<meta property="og:title" content="Envela 💌 Ein Brief wartet auf dich">
<meta property="og:description" content="Jeden Tag eine Frage. Ein Brief von dir, einer von mir – versiegelt, bis ihr beide geschrieben habt.">
<meta property="og:image" content="https://kmcornelius.github.io/assets/envela-icon.png">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<link rel="icon" type="image/png" href="/assets/envela-icon.png">
<link rel="apple-touch-icon" href="/assets/envela-icon.png">
<style>
  :root { --cream:#F6EFE6; --paper:#FBF6EE; --ink:#1C2A4A; --wax:#C1436A; --kraft:#B99A6B; --muted:#7A6E5E; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; }
  body {
    background:var(--cream); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    display:flex; align-items:center; justify-content:center; padding:24px;
    min-height:100dvh;
  }
  .card {
    background:var(--paper); border:1px solid rgba(185,154,107,.28);
    border-radius:22px; padding:36px 28px; max-width:380px; width:100%;
    text-align:center; box-shadow:0 18px 50px rgba(28,42,74,.12);
  }
  .seal { font-size:52px; line-height:1; margin-bottom:14px; }
  h1 { font-family:Georgia,"Times New Roman",serif; font-size:27px; margin:0 0 8px; font-weight:700; }
  p  { color:var(--muted); font-size:15px; line-height:1.5; margin:0 0 22px; }
  .code-label { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--kraft); margin-bottom:6px; }
  .code {
    font-family:"SF Mono",ui-monospace,Menlo,monospace; font-size:34px; font-weight:700;
    letter-spacing:8px; color:var(--wax); background:#fff; border:1px dashed rgba(193,67,106,.4);
    border-radius:14px; padding:14px 10px 14px 18px; margin:0 auto 8px; display:inline-block;
  }
  .copied { font-size:12px; color:var(--wax); height:16px; margin-bottom:16px; opacity:0; transition:opacity .2s; }
  .copied.show { opacity:1; }
  .btn {
    display:block; width:100%; background:var(--ink); color:#fff; text-decoration:none;
    font-size:16px; font-weight:600; padding:15px; border-radius:100px; margin-top:8px;
  }
  .hint { font-size:12px; color:var(--muted); margin-top:16px; }
  .hidden { display:none; }
</style>
</head>
<body>
  <div class="card">
    <div class="seal">💌</div>
    <h1>Ein Brief wartet auf dich</h1>
    <p id="lead">Jemand hat dir bei Envela geschrieben – der Brief öffnet sich, sobald du zurückschreibst.</p>

    <div id="codeBlock" class="hidden">
      <div class="code-label">Eure Postleitzahl</div>
      <div class="code" id="codeText"></div>
      <div class="copied" id="copied">In die Zwischenablage kopiert ✓</div>
    </div>

    <a class="btn" id="storeBtn" href="https://apps.apple.com/app/id6779747084">Envela laden</a>
    <p class="hint" id="hint">Nach der Installation einfach die Postleitzahl eingeben – fertig.</p>
  </div>

<script>
  (function () {
    var appStore = "https://apps.apple.com/app/id6779747084";
    var params = new URLSearchParams(location.search);
    var raw = (params.get("code") || "").trim().toUpperCase();
    var code = /^[A-Z0-9]{6}$/.test(raw) ? raw : null;

    if (code) {
      document.getElementById("codeText").textContent = code;
      document.getElementById("codeBlock").classList.remove("hidden");
      // Code für nach der Installation in die Zwischenablage legen (best effort)
      if (navigator.clipboard) {
        navigator.clipboard.writeText(code).then(function () {
          document.getElementById("copied").classList.add("show");
        }).catch(function () {});
      }
      // Falls die App doch installiert ist: Custom-Scheme versuchen (öffnet direkt).
      try { window.location.href = "beso://join?code=" + code; } catch (e) {}
      // Nach kurzem Moment zum App Store (App nicht installiert / Scheme ignoriert).
      setTimeout(function () { window.location.href = appStore; }, 1200);
    }
    // Ohne Code: Seite bleibt stehen, „Envela laden" führt zum Store.
  })();
</script>
</body>
</html>
