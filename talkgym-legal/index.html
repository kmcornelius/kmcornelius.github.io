<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TalkGym – Support</title>
<style>
  :root { --ink:#14181F; --signal:#FF5A3C; --paper:#FAF6F1; --muted:#6B7280; }
  body { margin:0; background:var(--paper); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.6; display:flex; align-items:center; justify-content:center;
    min-height:100dvh; padding:24px; text-align:center; }
  .card { max-width:420px; }
  .logo { font-size:15px; font-weight:900; letter-spacing:3px; color:var(--signal); }
  h1 { font-size:30px; margin:8px 0 10px; }
  p { color:var(--muted); margin:0 0 20px; }
  a.btn { display:inline-block; background:var(--ink); color:#fff; text-decoration:none;
          font-weight:600; padding:13px 24px; border-radius:100px; margin:4px; }
  a.link { color:var(--signal); }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">TALKGYM</div>
    <h1>Das Gym für schwierige Gespräche.</h1>
    <p>Fragen, Feedback oder Problem mit der App? Schreib uns — wir antworten schnell.</p>
    <a class="btn" href="mailto:koniecznycornelius@gmail.com">Support kontaktieren</a>
    <p style="margin-top:24px"><a class="link" href="/talkgym-legal/datenschutz/">Datenschutzerklärung</a></p>
  </div>
</body>
</html>
