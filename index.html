<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Envela</title>
<style>
  :root { --cream:#F6EFE6; --paper:#FBF6EE; --ink:#1C2A4A; --wax:#C1436A; --muted:#7A6E5E; }
  html,body { margin:0; height:100%; }
  body {
    background:var(--cream); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    display:flex; align-items:center; justify-content:center; min-height:100dvh; padding:24px;
    text-align:center;
  }
  .seal { font-size:64px; margin-bottom:12px; }
  h1 { font-family:Georgia,serif; font-size:44px; margin:0 0 6px; }
  p { color:var(--muted); font-size:17px; margin:0 0 28px; }
  a.btn { display:inline-block; background:var(--ink); color:#fff; text-decoration:none;
          font-weight:600; padding:14px 26px; border-radius:100px; }
  a.link { display:block; margin-top:18px; color:var(--muted); font-size:13px; }
</style>
</head>
<body>
  <div>
    <div class="seal">💌</div>
    <h1>Envela</h1>
    <p>Täglich ein Brief füreinander.</p>
    <a class="btn" href="https://apps.apple.com/app/id6779747084">Im App Store laden</a>
    <a class="link" href="https://kmcornelius.github.io/envela-legal/datenschutz">Datenschutz</a>
  </div>
</body>
</html>
